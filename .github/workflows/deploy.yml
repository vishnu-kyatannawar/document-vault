name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm test

      - name: Build
        env:
          # Public Client ID — safe to expose. Set in repo → Settings → Secrets
          # and variables → Actions → Variables → VITE_GOOGLE_CLIENT_ID.
          VITE_GOOGLE_CLIENT_ID: ${{ vars.VITE_GOOGLE_CLIENT_ID }}
        run: pnpm build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url || steps.retry1.outputs.page_url || steps.retry2.outputs.page_url }}
    steps:
      # Pages deployments intermittently fail with "Deployment failed, try
      # again later" — retry up to 3 attempts before marking the job failed.
      - id: deployment
        uses: actions/deploy-pages@v4
        continue-on-error: true

      - if: steps.deployment.outcome == 'failure'
        run: sleep 30

      - id: retry1
        if: steps.deployment.outcome == 'failure'
        uses: actions/deploy-pages@v4
        continue-on-error: true

      - if: steps.deployment.outcome == 'failure' && steps.retry1.outcome == 'failure'
        run: sleep 60

      - id: retry2
        if: steps.deployment.outcome == 'failure' && steps.retry1.outcome == 'failure'
        uses: actions/deploy-pages@v4
