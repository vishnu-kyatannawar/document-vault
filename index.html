<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta
      name="viewport"
      content="viewport-fit=cover, width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <meta name="theme-color" content="#f7f6f3" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Vault" />
    <!--
      Content Security Policy: only self + Google Identity/Drive endpoints.
      No inline scripts allowed (Vite injects module scripts by src).
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self';
               script-src 'self' https://accounts.google.com;
               worker-src 'self' blob:;
               frame-src https://accounts.google.com https://content.googleapis.com;
               connect-src 'self' https://www.googleapis.com https://content.googleapis.com https://accounts.google.com;
               img-src 'self' data: blob: https://*.googleusercontent.com https://*.googleapis.com;
               style-src 'self' 'unsafe-inline';
               font-src 'self' data:;
               object-src 'none';
               base-uri 'self';
               form-action 'self';"
    />
    <title>Document Vault</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
